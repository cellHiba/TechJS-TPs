<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 Book Reading Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
  <div class="max-w-5xl mx-auto">
    <!-- Titre -->
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">📚 Book Reading Tracker</h1>

    <!-- Section Stats Globales (Slide 49) -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-sm text-gray-500">Livres terminés</p>
        <p id="totalRead" class="text-2xl font-bold text-green-600">0</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow text-center">
        <p class="text-sm text-gray-500">Total pages lues</p>
        <p id="totalPagesRead" class="text-2xl font-bold text-blue-600">0</p>
      </div>
    </div>

    <!-- Formulaire d'ajout (Slide 49) -->
    <form id="bookForm" class="bg-white p-6 rounded-lg shadow mb-8 grid grid-cols-1 md:grid-cols-2 gap-4">
      <input name="title" type="text" placeholder="Titre *" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input name="author" type="text" placeholder="Auteur *" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input name="totalPages" type="number" placeholder="Nb pages total *" min="1" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input name="price" type="number" placeholder="Prix (€) *" min="0" step="0.01" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input name="pagesRead" type="number" placeholder="Pages lues (début)" min="0" value="0" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input name="suggestedBy" type="text" placeholder="Suggéré par" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

      <select name="status" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="Read">Read</option>
        <option value="Re-read">Re-read</option>
        <option value="DNF">DNF</option>
        <option value="Currently reading" selected>Currently reading</option>
        <option value="Returned Unread">Returned Unread</option>
        <option value="Want to read">Want to read</option>
      </select>

      <select name="format" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="Print">Print</option>
        <option value="PDF">PDF</option>
        <option value="Ebook">Ebook</option>
        <option value="AudioBook">AudioBook</option>
      </select>

      <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition">
        ➕ Ajouter le livre
      </button>
    </form>

    <!-- Liste des livres (Slide 49) -->
    <div id="booksList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <!-- Script frontend compilé -->
  <script src="/js/app.js"></script>
</body>
</html>
